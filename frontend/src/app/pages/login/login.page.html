<ion-content class="login-background">

  <div class="login-container">

    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title class="titulo-login">Iniciar Sesión</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <form (ngSubmit)="iniciarSesion()">

          <ion-input
            class="input-transparente"
            label="Usuario"
            label-placement="floating"
            type="text"
            autocomplete="username"
            [(ngModel)]="credentials.Usuario"
            name="Usuario"
            required>
          </ion-input>

          <ion-input
            class="input-transparente"
            label="Contraseña"
            label-placement="floating"
            type="password"
            autocomplete="current-password"
            [(ngModel)]="credentials.Password"
            name="Password"
            required>
          </ion-input>

          <ion-button
            type="submit"
            expand="block"
            color="primary"
            class="login-btn"
            [disabled]="isLoading">
            <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
            {{ isLoading ? 'Ingresando...' : 'Iniciar Sesión' }}
          </ion-button>

        </form>

        <div class="version-footer">
          Versión {{ version }} <br />
          <ion-note>contactos&#64;gamatek.org</ion-note>
        </div>

      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
